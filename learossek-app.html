// Escape HTML to prevent XSS in any context that renders raw HTML (e.g. Leaflet popups)
const escapeHtml = (s) => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

// Proper email validation (not just includes('@'))
const isValidEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(String(e||'').trim());

// Phone: allow digits, spaces, +, -, (, ) — 7–20 chars

// Strip leading/trailing whitespace and cap length

// Admin API caller — all admin operations go through /api/admin
// which validates the password server-side and uses the service_role key
const adminFetch = async (action, payload, password) => {
  const res = await fetch('/api/admin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, payload: payload || {}, password }),
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
};

// Price after the client's tier discount
const discountedPrice = (price, tier) => {
  const p = Number(price) || 0;
  if (!tier || !tier.discount) return { final: p, original: p, saved: 0 };
  const final = Math.round((p * (1 - tier.discount / 100)) * 100) / 100;
  return { final, original: p, saved: Math.round((p - final) * 100) / 100 };
};

// MAP COMPONENT (Leaflet / OpenStreetMap)

function MapView({ lat, lng, label, address }) {
  const mapId = useRef('map-' + Math.random().toString(36).substr(2,6));
  const mapRef = useRef(null);

  useEffect(() => {
    if (!lat || !lng) return;
    if (mapRef.current) return; // already init
    setTimeout(() => {
      const el = document.getElementById(mapId.current);
      if (!el || !window.L) return;
      const map = L.map(el, { zoomControl: true, scrollWheelZoom: false }).setView([lat, lng], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 19,
      }).addTo(map);
      const icon = L.divIcon({
        html: `<div style="width:36px;height:36px;background:#5a7032;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3)"></div>`,
        iconSize: [36, 36], iconAnchor: [18, 36], className: ''
      });
      L.marker([lat, lng], { icon }).addTo(map).bindPopup(`<b>${escapeHtml(label)}</b><br/>${escapeHtml(address)}`).openPopup();
      mapRef.current = map;
    }, 100);
    return () => { if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; } };
  }, [lat, lng]);

  if (!lat || !lng) return null;
  return (
    <div style={{ margin: '12px 14px 0', borderRadius: 14, overflow: 'hidden', border: '1.5px solid #ddedc8' }}>
      <div id={mapId.current} style={{ height: 180, width: '100%' }} />
      <a
        href={`https://maps.google.com/?q=${lat},${lng}`}
        target="_blank" rel="noopener noreferrer"
        style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, padding: '11px', background: '#f7fbf2', fontSize: 13, fontWeight: 700, color: '#5a7032', textDecoration: 'none' }}
      >
        <Icon name='map-pin' size={14} style={{marginRight:4}} />Open in Google Maps
      </a>
    </div>
  );
}

// ─────────────────────────────────────────────
// REGISTER PAGE — with email OTP verification
// ─────────────────────────────────────────────
function RegisterPage({ onDone, setClient }) {
  const [step, setStep]     = useState('form');   // 'form' | 'otp' | 'done'
  const [form, setForm]     = useState({ name: '', email: '', mobile: '' });
  const [otp, setOtp]       = useState('');
  const [loading, setLoad]  = useState(false);
  const [error, setError]   = useState(null);
  const [resent, setResent] = useState(false);
  const [resendCooldown, setResendCooldown] = useState(0); // seconds remaining

  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));
  const validForm = sanitize(form.name).length >= 2 && isValidEmail(form.email) && isValidMobile(form.mobile);
  const validOtp  = otp.trim().length >= 6;

  // Step 1: save client record + send OTP email
  const submitForm = async () => {
    if (!validForm) return;
    setLoad(true); setError(null);

    if (DEMO_MODE) {
      // Demo: skip OTP, save to localStorage and finish
      (setClient || saveClient)({ name: form.name.trim(), email: form.email.trim().toLowerCase(), mobile: form.mobile.trim(), sessions_count: 0, preferences: {} });
      setTimeout(() => { setLoad(false); setStep('done'); }, 700);
      return;
    }

    // Upsert client record first
    const { error: dbErr } = await sb.from('clients').upsert(
      [{ name: form.name.trim(), email: form.email.trim().toLowerCase(), mobile: form.mobile.trim(), sessions_count: 0 }],
      { onConflict: 'email', ignoreDuplicates: false }
    );
    if (dbErr) { setLoad(false); setError(dbErr.message); return; }

    // Send OTP via Supabase Auth
    const { error: otpErr } = await sb.auth.signInWithOtp({
      email: form.email.trim().toLowerCase(),
      options: { shouldCreateUser: true, data: { name: form.name.trim() } }
    });
    setLoad(false);
    if (otpErr) { setError(otpErr.message); return; }
    setStep('otp');
  };

  // Step 2: verify OTP
  const verifyOtp = async () => {
    if (!validOtp) return;
    setLoad(true); setError(null);

    // Try 'signup' type first (new users), fall back to 'email' (returning users)
    let verifyErr = null;
    for (const otpType of ['signup', 'email', 'magiclink']) {
      const result = await sb.auth.verifyOtp({
        email: form.email.trim().toLowerCase(),
        token: otp.trim(),
        type: otpType,
      });
      if (!result.error) { verifyErr = null; break; }
      verifyErr = result.error;
    }
    setLoad(false);
    if (verifyErr) { setError('Invalid or expired code. Try again.'); return; }

    // Save to global session so booking forms pre-fill and login is recognised
    (setClient || saveClient)({ name: form.name.trim(), email: form.email.trim().toLowerCase(), mobile: form.mobile.trim(), sessions_count: 0, preferences: {} });
    setStep('done');
  };

  const resendOtp = async () => {
    if (resendCooldown > 0) return;
    setResent(false);
    await sb.auth.signInWithOtp({ email: form.email.trim().toLowerCase(), options: { shouldCreateUser: false } });
    setResent(true);
    // 60-second cooldown to prevent spam
    setResendCooldown(60);
    const timer = setInterval(() => {
      setResendCooldown(c => { if (c <= 1) { clearInterval(timer); return 0; } return c - 1; });
    }, 1000);
  };

  // ── DONE ──
  if (step === 'done') return (
    <div style={{ ...base.screen, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 28px' }}>
      <div style={{ width: 90, height: 90, borderRadius: '50%', background: C.mist, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 24 }}>
        <Icon name='check' size={40} color={C.olive} weight='bold' />
      </div>
      <div style={{ fontSize: 24, fontWeight: 300, color: C.olive, letterSpacing: 2, marginBottom: 10, textAlign: 'center' }}>Welcome!</div>
      <div style={{ fontSize: 14, color: C.light, textAlign: 'center', lineHeight: 1.7, marginBottom: 10 }}>
        You're part of the Lea Rossek community,<br/><strong>{form.name.trim()}</strong>.
      </div>
      <div style={{ fontSize: 13, color: C.sage, textAlign: 'center', marginBottom: 30 }}>
        Your details are saved — booking forms will pre-fill automatically.
      </div>
      <button style={base.btn} onClick={onDone}>View Schedule</button>
    </div>
  );

  // ── OTP STEP ──
  if (step === 'otp') return (
    <div style={base.screen}>
      <div style={{ ...base.header, textAlign: 'center', padding: '28px 20px 24px' }}>
        <img src={LOGO_B64} style={{ width: 60, height: 60, borderRadius: '50%', marginBottom: 14 }} alt="Lea Rossek" />
        <div style={{ color: C.white, fontSize: 20, fontWeight: 200, letterSpacing: 3 }}>Check Your Email</div>
        <div style={{ color: 'rgba(255,255,255,0.65)', fontSize: 13, marginTop: 4 }}>
          Code sent to {form.email}
        </div>
      </div>

      <div style={{ padding: '24px 16px' }}>
        <div style={{ background: C.white, borderRadius: 16, padding: '24px 20px', boxShadow: '0 2px 14px rgba(90,112,50,0.07)', marginBottom: 14 }}>
          <div style={{ fontSize: 13, color: '#555', lineHeight: 1.6, marginBottom: 20, textAlign: 'center' }}>
            Enter the 6-digit code from the email we sent you. Check your spam folder if you don't see it.
          </div>

          <label style={base.label}>Verification Code</label>
          <input
            style={{ ...base.input, fontSize: 28, fontWeight: 800, letterSpacing: 8, textAlign: 'center', color: C.olive }}
            type='text'
            inputMode='numeric'
            pattern='[0-9]*'
            autoComplete='one-time-code'
            placeholder='00000000'
            maxLength={8}
            value={otp}
            onChange={e => { setOtp(e.target.value.replace(/\D/g,'').slice(0,8)); setError(null); }}
          />

          {error && <div style={{ color: '#e74c3c', fontSize: 13, marginTop: 10, textAlign: 'center' }}>{error}</div>}
          {resent && <div style={{ color: C.sage, fontSize: 13, marginTop: 10, textAlign: 'center' }}>Code resent!</div>}

          <button
            style={{ ...base.btn, marginTop: 18, opacity: validOtp ? 1 : 0.45 }}
            onClick={verifyOtp} disabled={!validOtp || loading}
          >
            {loading ? 'Verifying…' : 'Verify Email'}
          </button>
        </div>

        <div style={{ textAlign: 'center' }}>
          <button onClick={resendOtp} disabled={resendCooldown > 0} style={{ background: 'none', border: 'none', color: resendCooldown > 0 ? '#bbb' : C.sage, fontSize: 13, cursor: resendCooldown > 0 ? 'default' : 'pointer', fontFamily: 'Nunito', marginBottom: 8 }}>
            {resendCooldown > 0 ? `Resend in ${resendCooldown}s` : "Didn't receive it? Resend code"}
          </button>
          <br/>
          <button onClick={() => { setStep('form'); setOtp(''); setError(null); }} style={{ background: 'none', border: 'none', color: '#aaa', fontSize: 13, cursor: 'pointer', fontFamily: 'Nunito' }}>
            ← Change email
          </button>
        </div>
      </div>
    </div>
  );

  // ── FORM STEP ──
  return (
    <div style={base.screen}>
      <div style={{ ...base.header, textAlign: 'center', padding: '28px 20px 24px' }}>
        <img src={LOGO_B64} style={{ width: 70, height: 70, borderRadius: '50%', marginBottom: 14 }} alt="Lea Rossek" />
        <div style={{ color: C.white, fontSize: 22, fontWeight: 200, letterSpacing: 3 }}>Join the Community</div>
        <div style={{ color: 'rgba(255,255,255,0.65)', fontSize: 13, marginTop: 4 }}>Register to track your sessions & rewards</div>
      </div>

      {/* Tier teaser */}
      <div style={{ display: 'flex', gap: 8, padding: '14px 14px 0' }}>
        {TIERS.map(t => (
          <div key={t.name} style={{ flex: 1, background: C.white, borderRadius: 12, padding: '12px 8px', textAlign: 'center', boxShadow: '0 2px 8px rgba(90,112,50,0.07)' }}>
            <Icon name={t.ph} size={22} color={t.color} />
            <div style={{ fontSize: 12, fontWeight: 800, color: t.color, marginTop: 4 }}>{t.name}</div>
            <div style={{ fontSize: 10, color: C.light, marginTop: 2 }}>{t.discount > 0 ? `${t.discount}% off` : 'Starter'}</div>
          </div>
        ))}
      </div>

      <div style={{ margin: '16px 14px 0', display: 'flex', flexDirection: 'column', gap: 14 }}>
        <div><label style={base.label}>Full Name</label><input style={base.input} placeholder="Your full name" maxLength={80} value={form.name} onChange={set('name')} /></div>
        <div><label style={base.label}>Email</label><input style={base.input} type="email" placeholder="your@email.com" maxLength={120} autoComplete="email" value={form.email} onChange={set('email')} /></div>
        <div><label style={base.label}>Mobile</label><input style={base.input} type="tel" placeholder="+961 xx xxx xxx" maxLength={20} autoComplete="tel" value={form.mobile} onChange={set('mobile')} /></div>

        <div style={{ background: C.cream, border: `1px solid ${C.border}`, borderRadius: 10, padding: '12px 14px', fontSize: 13, color: '#444', lineHeight: 1.5, display: 'flex', gap: 8 }}>
          <Icon name='envelope' size={16} color={C.sage} style={{marginTop:1,flexShrink:0}} />
          <span>We'll send a verification code to your email to confirm your account.</span>
        </div>

        {error && <div style={{ color: '#e74c3c', fontSize: 13, textAlign: 'center' }}>{error}</div>}
        <button style={{ ...base.btn, opacity: validForm ? 1 : 0.45 }} onClick={submitForm} disabled={!validForm || loading}>
          {loading ? 'Sending code…' : 'Create My Account'}
        </button>
        <button style={{ background: 'none', border: 'none', color: C.light, fontSize: 13, cursor: 'pointer', paddingBottom: 10 }} onClick={onDone}>
          Skip for now
        </button>
      </div>
    </div>
  );
}

// Icon component — wraps Phosphor icons with consistent sizing
function Icon({ name, size = 20, weight = 'regular', color, style: extraStyle = {} }) {
  return (
    <i
      className={`ph${weight === 'bold' ? '-bold' : ''} ph-${name}`}
      style={{ fontSize: size, color: color, lineHeight: 1, display: 'inline-flex', alignItems: 'center', ...extraStyle }}
    />
  );
}

function Logo({ size = 44 }) {
  return <img src={LOGO_B64} style={{ width: size, height: size, borderRadius: '50%', flexShrink: 0, objectFit: 'cover' }} alt="Lea Rossek" />;
}

function Spinner() {
  return <div style={{ textAlign: 'center', padding: 40, color: '#aaa', fontSize: 14 }}>Loading…</div>;
}

// Round avatar showing the client's initial, tinted with their tier color
function Avatar({ client, size = 38 }) {
  const tier = client ? getTier(client.sessions_count || 0) : null;
  const initial = client?.name ? client.name.trim()[0].toUpperCase() : '?';
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: tier ? tier.color : 'rgba(255,255,255,0.18)', color: C.white, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: size * 0.42, flexShrink: 0, border: '2px solid rgba(255,255,255,0.55)' }}>
      {initial}
    </div>
  );
}

// Small pill in headers: shows who's logged in (or a Sign-in nudge)
function LoginPill({ client, onClick }) {
  const tier = client ? getTier(client.sessions_count || 0) : null;
  if (!client) return (
    <button onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'rgba(255,255,255,0.14)', border: 'none', color: C.white, padding: '7px 12px', borderRadius: 22, fontSize: 12, fontWeight: 800, cursor: 'pointer', fontFamily: 'Nunito' }}>
      <Icon name='sign-in' size={15} color={C.white} /> Sign in
    </button>
  );
  return (
    <button onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 8, background: 'rgba(255,255,255,0.14)', border: 'none', padding: '5px 12px 5px 5px', borderRadius: 24, cursor: 'pointer', fontFamily: 'Nunito' }}>
      <Avatar client={client} size={30} />
      <div style={{ textAlign: 'left', lineHeight: 1.1 }}>
        <div style={{ color: C.white, fontSize: 12, fontWeight: 800 }}>{client.name.split(' ')[0]}</div>
        <div style={{ color: tier.color === '#c9a84c' ? '#f3e6b8' : 'rgba(255,255,255,0.7)', fontSize: 9, fontWeight: 800, letterSpacing: 1, textTransform: 'uppercase' }}>{tier.name}</div>
      </div>
    </button>
  );
}

// Tier chip used inline
function TierBadge({ tier, size = 'sm' }) {
  const pad = size === 'lg' ? '6px 14px' : '4px 10px';
  const fs  = size === 'lg' ? 13 : 11;
  return (

function BookingForm({ session, client, setClient, onBack, onDone }) {
  const isGuest = session.type === 'guest';
  const tier  = client ? getTier(client.sessions_count || 0) : null;
  const dp    = discountedPrice(session.price, tier);
  const isPriority = !!(tier && tier.priority);

  // Guest (not logged in) needs to provide details; logged-in users just confirm.
  const [form, setForm]     = useState({ name: client?.name||'', email: client?.email||'', mobile: client?.mobile||'' });
  const [submitted, setSub] = useState(false);
  const [loading, setLoad]  = useState(false);
  const [error, setError]   = useState(null);
  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
  const valid = sanitize(form.name).length >= 2 && isValidEmail(form.email) && isValidMobile(form.mobile);

  const submit = async () => {
    if (!client && !valid) return;
    const name = (client?.name || form.name).trim();
    const email = (client?.email || form.email).trim().toLowerCase();
    const mobile = (client?.mobile || form.mobile).trim();
    setLoad(true); setError(null);
    const { error } = await DB.submitBooking({
      client_name:   name,
      client_email:  email,
      client_mobile: mobile,
      session_id:    session.id,
      session_title: session.title,
      session_date:  session.date,
      session_time:  session.time,
      session_type:  session.type,
      priority:      isPriority,
    });
    setLoad(false);
    if (error) { setError('Something went wrong. Please try again.'); return; }
    // First-time guest who just booked becomes a saved client
    if (!client && setClient) setClient({ name, email, mobile, sessions_count: 0, preferences: {} });
    setSub(true);

// Month calendar — highlights days that have classes; tap a day to filter
function MonthCalendar({ sessions, selected, onSelect }) {
  const [cursor, setCursor] = useState(() => {
    const d = selected ? new Date(selected + 'T00:00:00') : new Date();
    return { y: d.getFullYear(), m: d.getMonth() };
  });
  const byDay = {};
  sessions.forEach(s => { (byDay[s.date] = byDay[s.date] || []).push(s); });

  const first = new Date(cursor.y, cursor.m, 1);
  const startPad = first.getDay();                 // 0=Sun
  const daysInMonth = new Date(cursor.y, cursor.m + 1, 0).getDate();
  const todayStr = new Date().toISOString().split('T')[0];
  const monthLabel = first.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const pad2 = n => String(n).padStart(2, '0');
  const cells = [];
  for (let i = 0; i < startPad; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const shift = (dir) => setCursor(c => {
    let m = c.m + dir, y = c.y;
    if (m < 0) { m = 11; y--; } if (m > 11) { m = 0; y++; }
    return { y, m };
  });

  return (
    <div style={{ ...base.card, margin: '12px 14px 0', padding: '14px 14px 16px' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
        <button onClick={() => shift(-1)} style={{ background: C.cream, border: 'none', borderRadius: 8, width: 32, height: 32, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name='caret-left' size={16} color={C.olive} /></button>
        <div style={{ fontSize: 15, fontWeight: 800, color: C.dark }}>{monthLabel}</div>
        <button onClick={() => shift(1)} style={{ background: C.cream, border: 'none', borderRadius: 8, width: 32, height: 32, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name='caret-right' size={16} color={C.olive} /></button>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, textAlign: 'center', marginBottom: 4 }}>
        {['S','M','T','W','T','F','S'].map((d,i) => <div key={i} style={{ fontSize: 10, fontWeight: 800, color: '#bbb', letterSpacing: 0.5 }}>{d}</div>)}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
        {cells.map((d, i) => {
          if (!d) return <div key={i} />;
          const ds = `${cursor.y}-${pad2(cursor.m + 1)}-${pad2(d)}`;
          const has = !!byDay[ds];
          const isSel = selected === ds;
          const isToday = todayStr === ds;
          return (
            <button key={i} onClick={() => onSelect(isSel ? null : ds)} disabled={!has}
              style={{ aspectRatio: '1', borderRadius: 10, border: isToday ? `1.5px solid ${C.sage}` : '1.5px solid transparent',
                background: isSel ? C.olive : has ? C.mist : 'transparent',
                color: isSel ? C.white : has ? C.dark : '#ccc',
                fontSize: 13, fontWeight: has ? 800 : 500, cursor: has ? 'pointer' : 'default',
                display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', position: 'relative', fontFamily: 'Nunito' }}>
              {d}
              {has && <div style={{ width: 4, height: 4, borderRadius: '50%', background: isSel ? C.white : C.olive, marginTop: 2 }} />}
            </button>
          );
        })}
      </div>
      {selected && <button onClick={() => onSelect(null)} style={{ background: 'none', border: 'none', color: C.sage, fontSize: 12, fontWeight: 700, cursor: 'pointer', marginTop: 12, fontFamily: 'Nunito' }}>Clear day filter ×</button>}
    </div>
  );
}

  const [loading, setLoad]  = useState(false);
  const [error, setError]   = useState(null);
  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
  const valid = sanitize(form.name).length >= 2 && isValidEmail(form.email) && isValidMobile(form.mobile) && form.date && sanitize(form.address).length >= 5;

  const submit = async () => {
    if (!valid) return;
    setLoad(true); setError(null);

      client_name:    form.name.trim(),
      client_email:   form.email.trim().toLowerCase(),

// MY CLASSES — the logged-in client's bookings
// ─────────────────────────────────────────────
function MyBookingsPage({ client, onOpenAccount, onBrowse }) {
  const [bookings, setBookings] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [busy, setBusy]         = useState(null);

  const load = useCallback(() => {
    if (!client?.email) { setLoading(false); return; }
    setLoading(true);
    DB.getBookingsByEmail(client.email).then(({ data }) => { setBookings(data || []); setLoading(false); });
  }, [client?.email]);
  useEffect(() => { load(); }, [load]);

  const cancel = async (b) => {
    setBusy(b.id);
    await DB.cancelBooking(b.id);
    setBusy(null);
    load();
  };

  const todayStr = new Date().toISOString().split('T')[0];
  const active = bookings.filter(b => b.status !== 'cancelled');
  const upcoming = active.filter(b => !b.session_date || b.session_date >= todayStr);
  const past     = active.filter(b => b.session_date && b.session_date < todayStr);
  const cancelled = bookings.filter(b => b.status === 'cancelled');

  const STATUS = {
    pending:   { label: 'Pending',   color: '#d4820a', bg: '#fff4e0', ph: 'hourglass-medium' },
    confirmed: { label: 'Confirmed', color: '#5a7032', bg: '#e8f3d6', ph: 'check-circle' },
    cancelled: { label: 'Cancelled', color: '#999',    bg: '#f0f0f0', ph: 'x-circle' },
  };

  const Row = ({ b, canCancel }) => {
    const st = STATUS[b.status] || STATUS.pending;
    const tc = TYPE.color[b.session_type] || C.sage;
    return (
      <div style={{ ...base.card, margin: '0 0 10px' }}>
        <div style={{ height: 4, background: tc }} />
        <div style={{ padding: '13px 16px 14px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8, marginBottom: 8 }}>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, color: C.text, lineHeight: 1.15 }}>{b.session_title}</div>
              <div style={{ fontSize: 12, color: C.light, marginTop: 3 }}>{TYPE.label[b.session_type] || b.session_type}</div>
            </div>
            <span style={{ background: st.bg, color: st.color, fontSize: 11, fontWeight: 800, padding: '4px 10px', borderRadius: 20, display: 'inline-flex', alignItems: 'center', gap: 4, whiteSpace: 'nowrap' }}>
              <Icon name={st.ph} size={12} color={st.color} />{st.label}
            </span>
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px 14px', fontSize: 12, color: C.light }}>
            {b.session_date && <span><Icon name='calendar' size={13} style={{marginRight:4}} />{fmtDate(b.session_date)}</span>}
            {b.session_time && <span><Icon name='clock' size={13} style={{marginRight:4}} />{b.session_time}</span>}
            {b.priority && <span style={{ color: '#b3902f', fontWeight: 700 }}><Icon name='crown-simple' size={13} style={{marginRight:4}} color='#b3902f' />Priority</span>}
          </div>
          {canCancel && (
            <button onClick={() => cancel(b)} disabled={busy === b.id} style={{ marginTop: 12, background: 'none', border: `1.5px solid #e7c4c4`, color: '#c0392b', borderRadius: 10, padding: '8px 14px', fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'Nunito' }}>
              {busy === b.id ? 'Cancelling…' : 'Cancel booking'}
            </button>
          )}
        </div>
      </div>
    );
  };

  return (
    <div style={base.screen}>
      <div style={base.header}>
        <div style={{ color: '#b5d18a', fontSize: 11, letterSpacing: 2, marginBottom: 4 }}>LEA ROSSEK</div>
        <div style={{ color: C.white, fontSize: 24, fontWeight: 200, letterSpacing: 2 }}>My Classes</div>
      </div>

      {!client ? (
        <div style={{ padding: '16px 14px' }}>
          <div style={{ ...base.card, margin: 0, padding: '26px 20px', textAlign: 'center' }}>
            <Icon name='calendar-check' size={34} color={C.sage} />
            <div style={{ fontSize: 16, fontWeight: 800, color: C.dark, margin: '12px 0 6px' }}>Sign in to see your classes</div>
            <div style={{ fontSize: 13, color: C.light, marginBottom: 18, lineHeight: 1.5 }}>Your booked and past sessions show up here once you're signed in.</div>
            <button style={base.btn} onClick={onOpenAccount}>Sign in / Join</button>
          </div>
        </div>
      ) : loading ? <Spinner /> : (
        <div style={{ padding: '16px 14px' }}>
          {active.length === 0 && cancelled.length === 0 && (
            <div style={{ ...base.card, margin: 0, padding: '26px 20px', textAlign: 'center' }}>
              <Icon name='calendar-blank' size={34} color='#ccc' />
              <div style={{ fontSize: 15, fontWeight: 700, color: '#555', margin: '12px 0 6px' }}>No bookings yet</div>
              <div style={{ fontSize: 13, color: C.light, marginBottom: 18 }}>Book a class to see it here.</div>
              <button style={base.btn} onClick={onBrowse}>Browse the schedule</button>
            </div>
          )}
          {upcoming.length > 0 && <div style={{ fontSize: 11, fontWeight: 800, color: C.sage, letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 10 }}>Upcoming</div>}
          {upcoming.map(b => <Row key={b.id} b={b} canCancel />)}
          {past.length > 0 && <div style={{ fontSize: 11, fontWeight: 800, color: '#bbb', letterSpacing: 1.5, textTransform: 'uppercase', margin: '14px 0 10px' }}>Past</div>}
          {past.map(b => <Row key={b.id} b={b} />)}
          {cancelled.length > 0 && <div style={{ fontSize: 11, fontWeight: 800, color: '#bbb', letterSpacing: 1.5, textTransform: 'uppercase', margin: '14px 0 10px' }}>Cancelled</div>}
          {cancelled.map(b => <Row key={b.id} b={b} />)}
        </div>
      )}
    </div>
  );
}

function ProfilePage({ client, onOpenAccount }) {
  const [email, setEmail]     = useState('');
  const [profile, setProfile] = useState(null);
  const [notFound, setNF]     = useState(false);
  const [loading, setLoad]    = useState(false);

  const loadFor = async (e) => {
    setLoad(true); setNF(false);
    const { data } = await DB.getClientByEmail(e);
    setLoad(false);
    if (data && data.length > 0) {
      const c = data[0];
      setProfile({ ...c, tier: getTier(c.sessions_count) });
    } else if (client && e === client.email) {
      // Logged in but no server record yet (e.g. brand-new) — show from local
      setProfile({ ...client, sessions_count: client.sessions_count || 0, tier: getTier(client.sessions_count || 0) });
    } else {
      setNF(true);
    }
  };

  // Auto-load the logged-in client's rewards — no email prompt
  useEffect(() => { if (client?.email) loadFor(client.email); }, [client?.email]);

  const lookup = () => { if (email.includes('@')) loadFor(email); };

  const nextTier = profile ? TIERS.find(t => t.min > profile.sessions_count) : null;
  const pct = profile ? (() => {
    const t = profile.tier;
    const max = t.max === Infinity ? profile.sessions_count + 5 : t.max;
    return Math.min(100, Math.round(((profile.sessions_count - t.min) / (max - t.min + 1)) * 100));
  })() : 0;

  return (
    <div style={base.screen}>
      <div style={base.header}>
        <div style={{ color: '#b5d18a', fontSize: 11, letterSpacing: 2, marginBottom: 4 }}>LEA ROSSEK</div>
        <div style={{ color: C.white, fontSize: 24, fontWeight: 200, letterSpacing: 2 }}>My Rewards</div>
      </div>

      {!profile ? (
        <div style={{ padding: '16px 14px' }}>
          {!client && (
            <div style={{ ...base.card, margin: '0 0 16px', padding: '22px 18px', textAlign: 'center', background: `linear-gradient(135deg, ${C.olive}, ${C.dark})` }}>
              <Icon name='star' size={30} color='#f3e6b8' weight='bold' />
              <div style={{ fontSize: 17, fontWeight: 800, color: C.white, margin: '10px 0 6px' }}>Sign in to see your rewards</div>

          {TIERS.map(t => (

                <div style={{ fontSize: 12, color: '#555' }}>{t.perk}</div>
              </div>

            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
              <div>
                <div style={{ fontSize: 13, color: '#999' }}>Welcome back,</div>
                <div style={{ fontSize: 24, fontWeight: 800, color: C.text }}>{profile.name}</div>
              </div>
              <div style={{ background: profile.tier.color, color: C.white, borderRadius: 10, padding: '5px 14px', fontSize: 14, fontWeight: 800, display: 'flex', alignItems: 'center', gap: 5 }}>

            </div>
            <div style={{ display: 'flex', marginBottom: 16 }}>
              {[{ val: profile.sessions_count, label: 'Sessions' }, { val: profile.tier.discount + '%', label: 'Discount' }, { val: profile.tier.priority ? <Icon name='check' size={20} color={profile.tier.color} weight='bold' /> : '–', label: 'Priority' }].map((s, i) => (
                <div key={i} style={{ flex: 1, textAlign: 'center', borderRight: i < 2 ? `1px solid ${profile.tier.color}30` : 'none' }}>
                  <div style={{ fontSize: 28, fontWeight: 800, color: profile.tier.color, lineHeight: 1.1 }}>{s.val}</div>
                  <div style={{ fontSize: 10, color: '#888', fontWeight: 700, letterSpacing: 1, marginTop: 3 }}>{s.label}</div>

            {nextTier && (

          </div>

          <div style={{ ...base.card, margin: '0 0 10px', padding: '16px 16px' }}>
            <div style={{ fontSize: 11, color: C.sage, fontWeight: 800, letterSpacing: 1.5, marginBottom: 12 }}>YOUR PERKS</div>
            {profile.tier.perks.map((p, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, paddingBottom: i < profile.tier.perks.length - 1 ? 10 : 0, fontSize: 14, color: '#333' }}>
                <Icon name='check-circle' size={18} color={profile.tier.color} weight='bold' />{p}
              </div>
            ))}
          </div>

          {profile.tier.rebate > 0 && (
            <div style={{ ...base.card, margin: '0 0 10px', padding: '16px 16px', display: 'flex', gap: 12, alignItems: 'center' }}>
              <div style={{ width: 46, height: 46, borderRadius: 12, background: profile.tier.color + '18', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <Icon name='gift' size={24} color={profile.tier.color} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: C.sage, fontWeight: 800, letterSpacing: 1.5, marginBottom: 3 }}>REBATED PACKAGES</div>
                <div style={{ fontSize: 13, color: '#444', lineHeight: 1.45 }}>Buy a class package and get <strong style={{ color: profile.tier.color }}>{profile.tier.rebate}% rebated</strong> as credit toward your next pack.</div>

            </div>
          )}

          {onOpenAccount && client && profile.email === client.email && (
            <button style={base.btnOut} onClick={onOpenAccount}><Icon name='gear' size={15} style={{marginRight:6}} />Manage account & preferences</button>
          )}
          {(!client || profile.email !== client?.email) && (
            <button style={base.btnOut} onClick={() => { setProfile(null); setEmail(''); }}>← Back</button>
          )}
        </div>
      )}
    </div>
  );
}

// ADMIN — ADD / EDIT SESSION MODAL

function SessionModal({ session, onSave, onClose }) {
  const blank = { type: 'studio', title: '', date: '', time: '', duration: 50, location: '', address: '', lat: '', lng: '', capacity: 2, price: '', external_link: '', coupon: '' };
  const [form, setForm] = useState(session ? { ...session, price: String(session.price), capacity: session.capacity || '' } : blank);
  const [saving, setSave] = useState(false);
  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
  const valid = form.title && form.date && form.time && form.location && form.price;

  const save = async () => {
    setSave(true);
    const data = {
      type: form.type, title: form.title.trim(), date: form.date, time: form.time,
      duration: parseInt(form.duration) || 50, location: form.location.trim(),
      address: form.address.trim() || null,
      capacity: form.type === 'studio' ? (parseInt(form.capacity) || 2) : null,
      price: parseFloat(form.price),
      external_link: form.type === 'guest' ? (form.external_link.trim() || null) : null,
      coupon: form.type === 'guest' ? (form.coupon.trim() || null) : null,
      lat: form.lat !== '' && form.lat !== undefined ? parseFloat(form.lat) || null : null,
      lng: form.lng !== '' && form.lng !== undefined ? parseFloat(form.lng) || null : null,
    };
    await onSave(session ? session.id : null, data);
    setSave(false);
    onClose();
  };

  const overlay = { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 300, display: 'flex', alignItems: 'flex-end' };
  const modal = { background: C.white, borderRadius: '20px 20px 0 0', padding: '20px 18px', width: '100%', maxHeight: '85vh', overflowY: 'auto' };

  return (
    <div style={overlay} onClick={onClose}>
      <div style={modal} onClick={e => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 18 }}>
          <div style={{ fontWeight: 800, fontSize: 17, color: C.dark }}>{session ? 'Edit Session' : 'New Session'}</div>
          <button onClick={onClose} style={{ background: '#f0f0f0', border: 'none', borderRadius: '50%', width: 30, height: 30, cursor: 'pointer', fontSize: 16 }}>×</button>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div>
            <label style={base.label}>Type</label>
            <select style={{ ...base.input }} value={form.type} onChange={set('type')}>
              <option value="studio">Private Studio (Miziara)</option>
              <option value="guest">Guest Class at Partner Studio</option>
            </select>
          </div>
          <div><label style={base.label}>Title</label><input style={base.input} placeholder="e.g. Morning Lagree" value={form.title} onChange={set('title')} /></div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <div><label style={base.label}>Date</label><input style={base.input} type="date" value={form.date} onChange={set('date')} /></div>
            <div><label style={base.label}>Time</label><input style={base.input} type="time" value={form.time} onChange={set('time')} /></div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <div><label style={base.label}>Duration (min)</label><input style={base.input} type="number" value={form.duration} onChange={set('duration')} /></div>
            <div><label style={base.label}>Price (USD)</label><input style={base.input} type="number" placeholder="35" value={form.price} onChange={set('price')} /></div>
          </div>
          <div><label style={base.label}>Studio / Location Name</label><input style={base.input} placeholder="e.g. Flex Studio Beirut" value={form.location} onChange={set('location')} /></div>
          <div><label style={base.label}>Address</label><input style={base.input} placeholder="e.g. Mar Mikhael, Beirut" value={form.address} onChange={set('address')} /></div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <div><label style={base.label}>Latitude (optional)</label><input style={base.input} placeholder="e.g. 34.283" value={form.lat} onChange={set('lat')} /></div>
            <div><label style={base.label}>Longitude (optional)</label><input style={base.input} placeholder="e.g. 35.683" value={form.lng} onChange={set('lng')} /></div>
          </div>
          {form.type === 'studio' && (
            <div><label style={base.label}>Capacity (machines)</label><input style={base.input} type="number" min="1" max="10" value={form.capacity} onChange={set('capacity')} /></div>
          )}
          {form.type === 'guest' && (<>
            <div><label style={base.label}>Booking Link (external)</label><input style={base.input} type="url" placeholder="https://studio.com/book" value={form.external_link} onChange={set('external_link')} /></div>
            <div><label style={base.label}>Coupon Code (optional)</label><input style={base.input} placeholder="e.g. LEAROSSEK10" value={form.coupon} onChange={set('coupon')} /></div>
          </>)}
          <button style={{ ...base.btn, opacity: valid ? 1 : 0.45, marginTop: 4 }} onClick={save} disabled={!valid || saving}>
            {saving ? 'Saving…' : session ? 'Save Changes' : 'Add Session'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ADMIN PANEL
// ─────────────────────────────────────────────
function AdminPanel({ onExit }) {
  const [authed, setAuthed]     = useState(false);
  const [pw, setPw]             = useState('');
  const [pwError, setPwErr]     = useState(false);
  const [loginLoading, setLoginLoading] = useState(false);
  const [tab, setTab]           = useState('bookings');
  const [confirmDialog, setConfirmDialog] = useState(null); // { message, onConfirm }

  // Data
  const [bookings, setBookings] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [clients, setClients]   = useState([]);
  const [prices, setPrices]     = useState({ studio: 35, private: 80 });
  const [loading, setLoading]   = useState(false);
  const [editPrice, setEP]      = useState(null);
  const [modal, setModal]       = useState(null); // null | 'new' | session obj
  const [opError, setOpError]   = useState(null); // error from admin operations

  // All admin calls go through /api/admin — password validated server-side
  const api = useCallback((action, payload = {}) => adminFetch(action, payload, pw), [pw]);

  // Server-side password validation — pw never compared in browser JS
  const tryLogin = async () => {
    if (!pw.trim()) { setPwErr(true); return; }
    setLoginLoading(true);
    try {
      await api('ping');
      setAuthed(true); setPwErr(false);
      loadAll();
    } catch {
      setPwErr(true);
    }
    setLoginLoading(false);
  };

  const loadAll = async () => {
    setLoading(true); setOpError(null);
    try {
      const [b, s, c, p] = await Promise.all([
        api('getAllBookings'),
        api('getAllSessions'),
        api('getAllClients'),
        DB.getPrices(),          // prices are public read, no admin needed
      ]);
      setBookings(b.data || []);
      setSessions(s.data || []);
      setClients(c.data || []);
      setPrices(p.data || { studio: 35, private: 80 });
    } catch (e) {
      setOpError('Failed to load data: ' + e.message);
    }
    setLoading(false);
  };

  const confirmBooking = async (id) => {
    try {
      await api('confirmBooking', { id });
      setBookings(bs => bs.map(b => b.id === id ? { ...b, status: 'confirmed' } : b));
    } catch (e) { setOpError('Confirm failed: ' + e.message); }
  };

  const cancelBooking = async (id) => {
    try {
      await api('cancelBooking', { id });
      // Show as cancelled in the list rather than removing it
      setBookings(bs => bs.map(b => b.id === id ? { ...b, status: 'cancelled' } : b));
    } catch (e) { setOpError('Cancel failed: ' + e.message); }
  };

  const savePrice = async (key, amount) => {
    try {
      await api('updatePrice', { key, amount: parseFloat(amount) });
      setEP(null);
    } catch (e) { setOpError('Price update failed: ' + e.message); }
  };

  const saveSession = async (id, data) => {
    try {
      if (id) {
        await api('updateSession', { id, data });
        setSessions(ss => ss.map(s => s.id === id ? { ...s, ...data } : s));
      } else {
        const res = await api('addSession', data);
        if (res.data && res.data[0]) setSessions(ss => [...ss, res.data[0]]);
      }
    } catch (e) { setOpError('Session save failed: ' + e.message); }
  };

  const deleteSession = (id) => {
    setConfirmDialog({
      message: 'Remove this session from the schedule?',
      onConfirm: async () => {
        setConfirmDialog(null);
        try {
          await api('deleteSession', { id });
          setSessions(ss => ss.filter(s => s.id !== id));
        } catch (e) { setOpError('Delete failed: ' + e.message); }
      },
    });
  };

  // CSV export with proper escaping to prevent injection
  const exportCSV = () => {
    const csvEscape = (v) => '"' + String(v ?? '').replace(/"/g, '""') + '"';
    const rows = [['Name', 'Email', 'Mobile', 'Sessions', 'Tier']];
    clients.forEach(c => {
      const t = getTier(c.sessions_count);
      rows.push([c.name, c.email, c.mobile, c.sessions_count, t.name]);
    });
    const csv = rows.map(r => r.map(csvEscape).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'learossek-clients.csv';
    a.click();
  };

  if (!authed) return (
    <div style={{ ...base.screen, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '0 32px' }}>
      <Logo size={60} />
      <div style={{ fontSize: 11, color: C.sage, fontWeight: 800, letterSpacing: 2, margin: '18px 0 6px', textTransform: 'uppercase' }}>Admin Access</div>
      <div style={{ fontSize: 22, fontWeight: 200, color: C.olive, letterSpacing: 2, marginBottom: 32 }}>lea rossek</div>
      <div style={{ width: '100%', marginBottom: 12 }}>
        <label style={base.label}>Password</label>
        <input style={{ ...base.input, ...(pwError ? { borderColor: '#e74c3c' } : {}) }} type="password" placeholder="Enter admin password" value={pw} onChange={e => { setPw(e.target.value); setPwErr(false); }} onKeyDown={e => e.key === 'Enter' && tryLogin()} />
        {pwError && <div style={{ color: '#e74c3c', fontSize: 12, marginTop: 6 }}>Incorrect password</div>}
      </div>
      <button style={{ ...base.btn, opacity: loginLoading ? 0.6 : 1 }} onClick={tryLogin} disabled={loginLoading}>{loginLoading ? 'Checking…' : 'Enter'}</button>
      <button onClick={onExit} style={{ background: 'none', border: 'none', color: '#bbb', marginTop: 18, cursor: 'pointer', fontSize: 13, fontFamily: 'Nunito' }}>← Back to app</button>
    </div>
  );

  const tabs = [
    { id: 'bookings', label: 'Bookings', count: bookings.filter(b => b.status === 'pending').length },
    { id: 'sessions', label: 'Sessions', count: null },
    { id: 'prices',   label: 'Prices',   count: null },
    { id: 'clients',  label: 'Clients',  count: clients.length },
  ];

  return (
    <div style={{ ...base.screen, background: '#f4f8f0' }}>
      <div style={{ background: C.dark, padding: '16px 18px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <Logo size={32} />
          <span style={{ color: C.white, fontSize: 15, fontWeight: 300, letterSpacing: 2 }}>Admin Panel</span>
          {DEMO_MODE && <span style={{ background: 'rgba(255,255,255,0.15)', color: 'rgba(255,255,255,0.8)', fontSize: 10, fontWeight: 700, padding: '2px 8px', borderRadius: 6 }}>DEMO</span>}
        </div>
        <button onClick={onExit} style={{ background: 'rgba(255,255,255,0.12)', border: 'none', color: C.white, borderRadius: 8, padding: '6px 12px', cursor: 'pointer', display:'flex', alignItems:'center', gap:4 }}><Icon name="sign-out" size={14} color={C.white} /><span style={{fontSize:12,fontWeight:700,fontFamily:'Nunito'}}>Exit</span></button>
      </div>

      <div style={{ background: C.white, borderBottom: `1px solid ${C.border}`, display: 'flex', overflowX: 'auto' }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: '0 0 auto', padding: '12px 14px 10px', fontSize: 12, fontWeight: 800, border: 'none', cursor: 'pointer', fontFamily: 'Nunito', background: tab === t.id ? C.cream : C.white, color: tab === t.id ? C.olive : '#aaa', borderBottom: `2.5px solid ${tab === t.id ? C.olive : 'transparent'}`, display: 'flex', alignItems: 'center', gap: 5 }}>
            {t.label}
            {t.count > 0 && <span style={{ background: tab === t.id ? C.olive : '#ddd', color: tab === t.id ? C.white : '#888', borderRadius: 10, padding: '1px 6px', fontSize: 10, fontWeight: 800 }}>{t.count}</span>}
          </button>
        ))}
      </div>

      {/* Operation error banner */}
      {opError && (
        <div style={{ background: '#fdeaea', borderBottom: '1px solid #f5c6c6', padding: '10px 16px', fontSize: 13, color: '#c0392b', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span><Icon name='warning' size={14} style={{marginRight:6}} />{opError}</span>
          <button onClick={() => setOpError(null)} style={{ background: 'none', border: 'none', color: '#c0392b', cursor: 'pointer', fontSize: 16, lineHeight: 1, padding: '0 4px' }}>×</button>
        </div>
      )}

      {/* Custom confirm dialog (replaces window.confirm — blocked in Instagram WebView) */}
      {confirmDialog && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 500, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 32px' }}>
          <div style={{ background: '#fff', borderRadius: 18, padding: '24px 22px', width: '100%', maxWidth: 320 }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: C.dark, marginBottom: 20, textAlign: 'center', lineHeight: 1.5 }}>{confirmDialog.message}</div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={() => setConfirmDialog(null)} style={{ flex: 1, background: C.cream, border: `1px solid ${C.border}`, color: C.dark, borderRadius: 10, padding: '12px', fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: 'Nunito' }}>Cancel</button>
              <button onClick={confirmDialog.onConfirm} style={{ flex: 1, background: '#fdeaea', border: 'none', color: '#c0392b', borderRadius: 10, padding: '12px', fontSize: 14, fontWeight: 700, cursor: 'pointer', fontFamily: 'Nunito' }}>Remove</button>
            </div>
          </div>
        </div>
      )}

      {loading && <Spinner />}

      {/* BOOKINGS */}
      {!loading && tab === 'bookings' && (
        <div style={{ padding: '10px 0' }}>
          {bookings.length === 0 && <div style={{ textAlign: 'center', color: '#bbb', padding: 40, fontSize: 14 }}>No bookings yet</div>}
          {bookings.map(b => (
            <div key={b.id} style={{ background: C.white, margin: '8px 14px', borderRadius: 14, padding: '14px 16px', boxShadow: '0 1px 8px rgba(90,112,50,0.05)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                <span style={{ fontWeight: 800, fontSize: 15 }}>{b.client_name}</span>
                <span style={{ fontSize: 11, fontWeight: 800, padding: '3px 10px', borderRadius: 10, background: b.status === 'confirmed' ? '#ddedc8' : '#fff3cd', color: b.status === 'confirmed' ? C.dark : '#856404' }}>{b.status.toUpperCase()}</span>
              </div>
              <div style={{ fontSize: 12, color: C.light, lineHeight: 1.9 }}>
                <div style={{display:'flex',alignItems:'center',gap:5}}><Icon name='envelope' size={12} />{b.client_email}</div>
                <div style={{display:'flex',alignItems:'center',gap:5}}><Icon name='device-mobile' size={12} />{b.client_mobile}</div>
                <div style={{display:'flex',alignItems:'center',gap:5}}><Icon name='calendar' size={12} />{b.session_title} · {b.session_date ? fmtDate(b.session_date) : 'TBD'}</div>
                <div style={{display:'flex',alignItems:'center',gap:5}}><Icon name='tag' size={12} />{TYPE.label[b.session_type]}</div>
                {b.private_address && <div style={{display:'flex',alignItems:'center',gap:5}}><Icon name='map-pin' size={12} />{b.private_address}</div>}
                {b.private_notes && <div style={{display:'flex',alignItems:'center',gap:5}}><Icon name='note' size={12} />{b.private_notes}</div>}
              </div>
              {b.status === 'pending' && (
                <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
                  <button onClick={() => confirmBooking(b.id)} style={{ flex: 1, background: '#ddedc8', color: C.dark, border: 'none', borderRadius: 9, padding: '10px', fontSize: 13, fontWeight: 800, cursor: 'pointer', fontFamily: 'Nunito' }}>Confirm</button>
                  <button onClick={() => cancelBooking(b.id)} style={{ flex: 1, background: '#fdeaea', color: '#c0392b', border: 'none', borderRadius: 9, padding: '10px', fontSize: 13, fontWeight: 800, cursor: 'pointer', fontFamily: 'Nunito' }}>Cancel</button>
                </div>
              )}
              {b.status === 'confirmed' && (
                <div style={{ marginTop: 10, background: C.cream, borderRadius: 8, padding: '8px 12px', fontSize: 12, color: C.sage, fontWeight: 700 }}><Icon name='star' size={12} style={{marginRight:4}} />Points awarded after session</div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* SESSIONS */}
      {!loading && tab === 'sessions' && (
        <div style={{ padding: '12px 14px' }}>
          <button style={{ ...base.btn, marginBottom: 14 }} onClick={() => setModal('new')}><Icon name='plus' size={14} style={{marginRight:5}} />Add New Session</button>
          {sessions.map(s => (
            <div key={s.id} style={{ background: C.white, borderRadius: 14, padding: '14px 16px', marginBottom: 10, boxShadow: '0 1px 8px rgba(90,112,50,0.05)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
                <span style={{ background: TYPE.color[s.type] + '18', color: TYPE.color[s.type], fontSize: 10, fontWeight: 800, letterSpacing: 1, padding: '4px 10px', borderRadius: 20, textTransform: 'uppercase' }}>{TYPE.label[s.type]}</span>
                <div style={{ display: 'flex', gap: 6 }}>
                  <button onClick={() => setModal(s)} style={{ background: C.cream, border: `1px solid ${C.border}`, color: C.olive, borderRadius: 7, padding: '5px 12px', fontSize: 11, fontWeight: 800, cursor: 'pointer', fontFamily: 'Nunito' }}><Icon name='pencil-simple' size={11} style={{marginRight:3}} />Edit</button>
                  <button onClick={() => deleteSession(s.id)} style={{ background: '#fdeaea', border: 'none', color: '#c0392b', borderRadius: 7, padding: '5px 10px', fontSize: 11, fontWeight: 800, cursor: 'pointer', fontFamily: 'Nunito' }}><Icon name='trash' size={11} style={{marginRight:3}} />Del</button>
                </div>
              </div>
              <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>{s.title}</div>
              <div style={{ fontSize: 12, color: C.light, lineHeight: 1.8 }}>
                <div style={{display:'flex',alignItems:'center',gap:5}}><Icon name='calendar' size={12} />{fmtDate(s.date)} · {s.time} · {s.duration}min</div>
                <div style={{display:'flex',alignItems:'center',gap:5}}><Icon name='map-pin' size={12} />{s.location}</div>
                <div style={{display:'flex',alignItems:'center',gap:5}}><Icon name='currency-dollar' size={12} />{s.price} USD</div>
                {s.capacity != null && <div style={{display:'flex',alignItems:'center',gap:5}}><Icon name='users' size={12} />{s.booked_count}/{s.capacity} booked</div>}
                {s.coupon && <div style={{display:'flex',alignItems:'center',gap:5}}><Icon name='ticket' size={12} />Coupon: <strong style={{ color: C.olive }}>{s.coupon}</strong></div>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* PRICES */}
      {!loading && tab === 'prices' && (
        <div style={{ padding: '16px 14px' }}>
          <div style={{ fontSize: 13, color: '#555', lineHeight: 1.6, marginBottom: 16 }}>Base prices shown to clients. Tier discounts apply automatically.</div>
          {[
            { key: 'studio',  label: 'Studio Session — Miziara', ph: 'house', desc: '2 machines · max 2 clients · 50 min' },
            { key: 'private', label: 'Private 1-on-1 Session',    ph: 'sparkle', desc: 'At client residence · 50 min' },
          ].map(item => (
            <div key={item.key} style={{ background: C.white, borderRadius: 14, padding: '16px 18px', marginBottom: 12, boxShadow: '0 1px 8px rgba(90,112,50,0.05)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div style={{ flex: 1, paddingRight: 12 }}>
                  <div style={{ fontWeight: 700, fontSize: 14, display:'flex', alignItems:'center', gap:6 }}><Icon name={item.ph} size={16} color={C.sage} />{item.label}</div>
                  <div style={{ fontSize: 12, color: '#aaa', marginTop: 3 }}>{item.desc}</div>
                </div>
                {editPrice === item.key ? (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <span style={{ fontWeight: 800, fontSize: 16, color: C.olive }}>$</span>
                    <input type="number" style={{ width: 68, border: `2px solid ${C.olive}`, borderRadius: 8, padding: '7px 8px', fontSize: 17, fontWeight: 800, color: C.olive, textAlign: 'center', fontFamily: 'Nunito', outline: 'none', background: C.cream }} value={prices[item.key]} onChange={e => setPrices(p => ({ ...p, [item.key]: e.target.value }))} />
                    <button onClick={() => savePrice(item.key, prices[item.key])} style={{ background: C.olive, color: C.white, border: 'none', borderRadius: 8, padding: '7px 12px', cursor: 'pointer', fontWeight: 800, fontFamily: 'Nunito' }}><Icon name='check' size={16} color={C.white} weight='bold' /></button>
                  </div>
                ) : (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <span style={{ fontSize: 26, fontWeight: 800, color: C.olive }}>${prices[item.key]}</span>
                    <button onClick={() => setEP(item.key)} style={{ background: C.cream, border: `1px solid ${C.border}`, color: C.olive, borderRadius: 8, padding: '6px 12px', fontSize: 12, fontWeight: 800, cursor: 'pointer', fontFamily: 'Nunito' }}><Icon name='pencil-simple' size={11} style={{marginRight:3}} />Edit</button>
                  </div>
                )}
              </div>
            </div>
          ))}
          <div style={{ background: C.white, borderRadius: 14, padding: '16px 18px', boxShadow: '0 1px 8px rgba(90,112,50,0.05)' }}>
            <div style={{ fontSize: 11, color: C.sage, fontWeight: 800, letterSpacing: 1.5, marginBottom: 12 }}>TIER DISCOUNTS (auto-applied)</div>
            {TIERS.map(t => (
              <div key={t.name} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: `1px solid ${C.border}` }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span>{t.icon}</span>
                  <span style={{ fontWeight: 700, color: t.color }}>{t.name}</span>
                  <span style={{ fontSize: 12, color: C.light }}>{t.max === Infinity ? `${t.min}+ sessions` : `${t.min}–${t.max} sessions`}</span>
                </div>
                <span style={{ fontWeight: 800, color: t.discount > 0 ? C.olive : '#aaa' }}>{t.discount > 0 ? `−${t.discount}%` : 'No discount'}</span>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 12, color: '#bbb', marginTop: 12, lineHeight: 1.5 }}>Guest studio prices are set per-event in the Sessions tab.</div>
        </div>
      )}

      {/* CLIENTS */}
      {!loading && tab === 'clients' && (
        <div style={{ padding: '12px 14px' }}>
          <button style={{ ...base.btnMist, marginBottom: 14 }} onClick={exportCSV}>Export Client List (CSV)</button>
          {clients.sort((a, b) => b.sessions_count - a.sessions_count).map((c, i) => {
            const tier = getTier(c.sessions_count);
            return (
              <div key={i} style={{ background: C.white, borderRadius: 14, padding: '14px 16px', marginBottom: 10, boxShadow: '0 1px 8px rgba(90,112,50,0.05)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                  <span style={{ fontWeight: 800, fontSize: 15 }}>{c.name}</span>
                  <span style={{ background: tier.bg, color: tier.color, fontSize: 12, fontWeight: 800, padding: '3px 10px', borderRadius: 10 }}><Icon name={tier.ph} size={14} style={{marginRight:3}} />{tier.name}</span>
                </div>
                <div style={{ fontSize: 12, color: C.light, lineHeight: 1.8 }}>
                  <div style={{display:'flex',alignItems:'center',gap:5}}><Icon name='envelope' size={12} />{c.email}</div>
                  <div style={{display:'flex',alignItems:'center',gap:5}}><Icon name='device-mobile' size={12} />{c.mobile}</div>
                  <div style={{display:'flex',alignItems:'center',gap:5}}><Icon name='barbell' size={12} />{c.sessions_count} sessions</div>
                  {tier.discount > 0 && <div style={{ color: C.sage, fontWeight: 700, display:'flex', alignItems:'center', gap:4 }}><Icon name='check-circle' size={12} />{tier.discount}% discount active</div>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Session modal */}
      {modal && <SessionModal session={modal === 'new' ? null : modal} onSave={saveSession} onClose={() => setModal(null)} />}
    </div>
  );
}

// ─────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────
function App() {
  const [page, setPage]       = useState('home');
  const [booking, setBooking] = useState(null);
  const [admin, setAdmin]     = useState(false);
  const [client, setClientState] = useState(() => loadClient());
  const tapCount              = useRef(0);
  const tapTimer              = useRef(null);

  // Single source of truth for the logged-in client (also persists to storage)
  const setClient = useCallback((c) => {
    if (c) { saveClient(c); setClientState(c); }
    else   { clearClient(); setClientState(null); }
  }, []);

  // Keep tier/sessions fresh from the server when we have a client
  useEffect(() => {
    if (!client?.email) return;
    DB.getClientByEmail(client.email).then(({ data }) => {
      if (data && data.length) {
        const s = data[0];
        setClientState(prev => {
          const merged = { ...prev, ...s };
          saveClient(merged);
          return merged;
        });
      }
    });
  }, [client?.email]);

  const tapLogo = () => {
    tapCount.current++;
    clearTimeout(tapTimer.current);
    tapTimer.current = setTimeout(() => { tapCount.current = 0; }, 2000);
    if (tapCount.current >= 5) { tapCount.current = 0; setAdmin(true); }
  };

  const goAccount = () => setPage(client ? 'account' : 'register');

  if (admin)   return <AdminPanel onExit={() => setAdmin(false)} />;
  if (booking) return <BookingForm session={booking} client={client} setClient={setClient} onBack={() => setBooking(null)} onDone={() => { setBooking(null); setPage(client ? 'bookings' : 'home'); }} />;

  return (
    <>
      {page === 'home'     && <HomePage onBookSession={setBooking} onOpenPrivate={() => setPage('private')} tapLogo={tapLogo} openAdmin={() => setAdmin(true)} client={client} onOpenAccount={goAccount} />}
      {page === 'bookings' && <MyBookingsPage client={client} onOpenAccount={goAccount} onBrowse={() => setPage('home')} />}
      {page === 'private'  && <PrivatePage onDone={() => setPage('home')} />}
      {page === 'profile'  && <ProfilePage client={client} onOpenAccount={goAccount} />}
      {page === 'account'  && <AccountPage client={client} setClient={setClient} onLogout={() => { setClient(null); setPage('home'); }} onJoin={() => setPage('register')} />}
      {page === 'register' && <RegisterPage onDone={() => setPage('home')} setClient={setClient} />}
      <NavBar page={page} setPage={setPage} client={client} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
